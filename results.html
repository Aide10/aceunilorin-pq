<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mock Result — AceUnilorin PQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root[data-theme="dark"] {
      --bg: #0F172A;
      --surface: #1E293B;
      --surface2: #253147;
      --primary: #3B82F6;
      --primary-glow: rgba(59,130,246,0.18);
      --text: #F1F5F9;
      --text-muted: #94A3B8;
      --border: rgba(255,255,255,0.07);
      --card-shadow: 0 4px 32px rgba(0,0,0,0.4);
      --header-bg: #0B1120;
    }
    :root[data-theme="light"] {
      --bg: #F0F4FF;
      --surface: #FFFFFF;
      --surface2: #E8EFFF;
      --primary: #2563EB;
      --primary-glow: rgba(37,99,235,0.12);
      --text: #1E293B;
      --text-muted: #64748B;
      --border: rgba(0,0,0,0.07);
      --card-shadow: 0 4px 24px rgba(37,99,235,0.08);
      --header-bg: #0F172A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* TOP HEADER BAR */
    .top-bar {
      background: #0B1535;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar-left { display: flex; align-items: center; gap: 14px; }
    .hamburger { font-size: 1.3rem; color: #fff; cursor: pointer; background: none; border: none; }
    .top-bar-date {
      font-size: 0.9rem; color: #fff;
      font-weight: 500;
    }
    .top-bar-icons { display: flex; gap: 10px; }
    .top-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: #fff; cursor: pointer;
      border: none; transition: background 0.2s;
    }
    .top-icon:hover { background: rgba(255,255,255,0.2); }

    /* MAIN CONTENT */
    .content {
      max-width: 500px; margin: 0 auto;
      padding: 32px 20px 64px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 4px;
    }

    /* RESULT CARDS */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--card-shadow);
      animation: fadeUp 0.5s ease both;
    }
    .result-card:nth-child(2) { animation-delay: 0.1s; }
    .result-card:nth-child(3) { animation-delay: 0.2s; }

    .card-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .card-icon {
      font-size: 2.8rem;
      margin-bottom: 16px;
      display: block;
    }

    /* Score display */
    .score-value {
      font-family: 'Syne', sans-serif;
      font-size: 4.5rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      display: block;
      margin-top: 8px;
    }
    .score-percent {
      font-size: 1.5rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .score-detail {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* Score color tiers */
    .score-excellent { color: #22C55E; }
    .score-good { color: #3B82F6; }
    .score-average { color: #F59E0B; }
    .score-poor { color: #EF4444; }

    /* Status display */
    .status-value {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      margin-top: 8px;
    }
    .status-badge {
      display: inline-block;
      background: rgba(245,158,11,0.15);
      color: #F59E0B;
      border: 1px solid rgba(245,158,11,0.3);
      font-size: 0.78rem; font-weight: 700;
      padding: 4px 14px; border-radius: 100px;
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 10px;
    }

    /* BREAKDOWN CARD */
    .breakdown-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      animation: fadeUp 0.5s 0.3s ease both;
    }
    .breakdown-title {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted);
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    .breakdown-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-key { color: var(--text-muted); font-weight: 500; }
    .breakdown-val { font-weight: 700; color: var(--text); }
    .breakdown-val.correct { color: #22C55E; }
    .breakdown-val.wrong { color: #EF4444; }
    .breakdown-val.skipped { color: #F59E0B; }

    /* ACTION BUTTONS */
    .action-btns {
      display: flex; flex-direction: column; gap: 12px;
      animation: fadeUp 0.5s 0.4s ease both;
    }
    .btn {
      padding: 15px; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-weight: 700;
      font-size: 0.95rem; cursor: pointer; border: none;
      transition: all 0.2s; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--primary-glow); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    /* PROGRESS RING */
    .progress-ring-wrap {
      display: flex; justify-content: center;
      margin: 8px 0 4px;
    }
    .progress-ring { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
    .ring-fill {
      fill: none; stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .ring-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      fill: var(--text);
      text-anchor: middle; dominant-baseline: central;
      transform: rotate(90deg);
      transform-origin: center;
    }
    .ring-sublabel {
      font-size: 0.5rem; font-weight: 600;
      fill: var(--text-muted);
      text-anchor: middle; dominant-baseline: central;
      transform: rotate(90deg);
      transform-origin: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-left">
      <button class="hamburger">☰</button>
      <span class="top-bar-date" id="topDate"></span>
    </div>
    <div class="top-bar-icons">
      <button class="top-icon" onclick="toggleTheme()">☀️</button>
      <button class="top-icon">🔔</button>
      <button class="top-icon">⚙️</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="page-title">Mock Result</div>

    <!-- SCORE CARD -->
    <div class="result-card">
      <div class="card-label">Mock Screening Score</div>

      <!-- Progress Ring -->
      <div class="progress-ring-wrap">
        <svg class="progress-ring" width="130" height="130" viewBox="0 0 130 130">
          <circle class="ring-bg" cx="65" cy="65" r="54"/>
          <circle class="ring-fill" id="ringFill" cx="65" cy="65" r="54"
            stroke="#3B82F6"
            stroke-dasharray="339.3"
            stroke-dashoffset="339.3"/>
          <text class="ring-text" x="65" y="60" id="ringText">0%</text>
          <text class="ring-sublabel" x="65" y="76" id="ringGrade"></text>
        </svg>
      </div>

      <span class="score-detail" id="scoreDetail">— / 100 marks</span>
    </div>

    <!-- ADMISSION STATUS CARD -->
    <div class="result-card">
      <div class="card-label">Admission Status</div>
      <span class="card-icon">🎓</span>
      <div class="status-value">Pending</div>
      <div class="status-badge">Awaiting Result</div>
    </div>

    <!-- BREAKDOWN CARD -->
    <div class="breakdown-card">
      <div class="breakdown-title">Score Breakdown</div>
      <div class="breakdown-row">
        <span class="breakdown-key">Total Questions</span>
        <span class="breakdown-val" id="bTotal">50</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">Correct Answers</span>
        <span class="breakdown-val correct" id="bCorrect">—</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">Wrong Answers</span>
        <span class="breakdown-val wrong" id="bWrong">—</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">Unanswered</span>
        <span class="breakdown-val skipped" id="bSkipped">—</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">Marks Obtained</span>
        <span class="breakdown-val" id="bMarks">— / 100</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-key">Time Taken</span>
        <span class="breakdown-val" id="bTime">—</span>
      </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="action-btns">
      <a href="mock.html" class="btn btn-primary">🔁 Try Another Mock</a>
      <a href="pastquestions.html" class="btn btn-outline">📝 Practice Past Questions</a>
      <a href="dashboard.html" class="btn btn-outline">🏠 Back to Dashboard</a>
    </div>

  </div>

  <script>
    // Theme
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.top-icon').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.querySelector('.top-icon').textContent = saved === 'dark' ? '☀️' : '🌙';

    // Date
    const now = new Date();
    document.getElementById('topDate').textContent = now.toLocaleDateString('en-GB', {
      weekday:'short', day:'numeric', month:'short', year:'numeric'
    });

    // Load result from localStorage (set by mock.html after exam)
    const result = JSON.parse(localStorage.getItem('mockResult')) || {
      correct: 36, wrong: 10, skipped: 4, timeTaken: '18:42'
    };

    const correct = result.correct;
    const wrong = result.wrong;
    const skipped = result.skipped;
    const total = 50;
    const marks = correct * 2;
    const percentage = Math.round((marks / 100) * 100);

    // Ring animation
    const circumference = 339.3;
    const offset = circumference - (percentage / 100) * circumference;
    const ring = document.getElementById('ringFill');
    const ringText = document.getElementById('ringText');
    const ringGrade = document.getElementById('ringGrade');

    // Color by score
    let color, grade;
    if (percentage === 100) { color = '#A855F7'; grade = 'Perfect'; }
    else if (percentage >= 90) { color = '#22C55E'; grade = 'Excellent'; }
    else if (percentage >= 80) { color = '#3B82F6'; grade = 'Very Good'; }
    else if (percentage >= 70) { color = '#06B6D4'; grade = 'Good'; }
    else if (percentage >= 60) { color = '#F59E0B'; grade = 'Okay'; }
    else if (percentage >= 50) { color = '#F97316'; grade = 'Fair'; }
    else { color = '#EF4444'; grade = 'Poor'; }

    ring.style.stroke = color;
    ringGrade.textContent = grade;
    ringGrade.style.fill = color;

    setTimeout(() => {
      ring.style.strokeDashoffset = offset;
      ringText.textContent = percentage + '%';
    }, 300);

    // Breakdown
    document.getElementById('scoreDetail').textContent = `${marks} / 100 marks`;
    document.getElementById('bCorrect').textContent = correct;
    document.getElementById('bWrong').textContent = wrong;
    document.getElementById('bSkipped').textContent = skipped;
    document.getElementById('bMarks').textContent = `${marks} / 100`;
    document.getElementById('bTime').textContent = result.timeTaken || '—';
  </script>
</body>
</html>
